<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DictBox 设置</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app">
    <!-- Animated background -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <img src="icons/icon48.png" alt="DictBox" class="logo-icon">
          <div>
            <h1>DictBox</h1>
            <p class="subtitle">快速字典翻译插件设置</p>
          </div>
        </div>
        <span class="version">v1.0.0</span>
      </header>

      <!-- Usage Guide Card -->
      <section class="card card-guide">
        <div class="card-header">
          <span class="card-icon">💡</span>
          <h2>使用方法</h2>
        </div>
        <div class="card-body">
          <div class="usage-steps">
            <div class="step">
              <span class="step-num">1</span>
              <span>在地址栏输入 <kbd>db</kbd></span>
            </div>
            <div class="step">
              <span class="step-num">2</span>
              <span>按 <kbd>空格</kbd> 或 <kbd>Tab</kbd></span>
            </div>
            <div class="step">
              <span class="step-num">3</span>
              <span>输入需要翻译的单词或短语</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Translation Engine Card -->
      <section class="card">
        <div class="card-header">
          <span class="card-icon">⚙️</span>
          <h2>翻译引擎</h2>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label for="provider">选择翻译服务</label>
            <div class="select-wrapper">
              <select id="provider">
                <option value="mymemory">MyMemory（免费，默认）</option>
                <option value="google">Google Translate</option>
                <option value="microsoft">Microsoft Dictionary</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
          </div>

          <!-- MyMemory specific -->
          <div id="mymemory-config" class="provider-config">
            <div class="form-group">
              <label for="mymemoryEmail">
                Email（可选）
                <span class="label-hint">提供 email 可将免费额度从 5,000 提升至 50,000 字符/天</span>
              </label>
              <input type="email" id="mymemoryEmail" placeholder="your@email.com">
            </div>
          </div>

          <!-- Google specific -->
          <div id="google-config" class="provider-config" style="display: none;">
            <div class="form-group">
              <label for="googleApiKey">
                Google API Key
                <span class="label-hint">从 Google Cloud Console 获取</span>
              </label>
              <div class="input-with-toggle">
                <input type="password" id="googleApiKey" placeholder="AIzaSy...">
                <button type="button" class="toggle-visibility" data-target="googleApiKey" title="显示/隐藏">
                  👁
                </button>
              </div>
            </div>
          </div>

          <!-- Microsoft specific -->
          <div id="microsoft-config" class="provider-config" style="display: none;">
            <div class="form-group">
              <label for="microsoftApiKey">
                Microsoft API Key
                <span class="label-hint">从 Azure Portal 获取 Cognitive Services 密钥</span>
              </label>
              <div class="input-with-toggle">
                <input type="password" id="microsoftApiKey" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
                <button type="button" class="toggle-visibility" data-target="microsoftApiKey" title="显示/隐藏">
                  👁
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="microsoftRegion">
                Azure Region（可选）
                <span class="label-hint">如 eastasia, westus2 等</span>
              </label>
              <input type="text" id="microsoftRegion" placeholder="eastasia">
            </div>
          </div>
        </div>
      </section>

      <!-- Target Language Card -->
      <section class="card">
        <div class="card-header">
          <span class="card-icon">🌐</span>
          <h2>目标语言</h2>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label for="targetLang">默认翻译结果语言</label>
            <div class="select-wrapper">
              <select id="targetLang">
                <option value="zh-CN">中文（简体）</option>
                <option value="zh-TW">中文（繁体）</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="pt">Português</option>
                <option value="ru">Русский</option>
                <option value="ar">العربية</option>
                <option value="th">ไทย</option>
                <option value="vi">Tiếng Việt</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
            <p class="form-hint">当输入的文字语言与目标语言相同时，将自动翻译为英文。</p>
          </div>
        </div>
      </section>

      <!-- Actions -->
      <div class="actions">
        <button id="btn-reset" class="btn btn-secondary">
          <span>↺</span> 恢复默认
        </button>
        <button id="btn-save" class="btn btn-primary">
          <span>✓</span> 保存设置
        </button>
      </div>

      <!-- Toast notification -->
      <div id="toast" class="toast" aria-live="polite"></div>

      <!-- Footer -->
      <footer class="footer">
        <p>DictBox v1.0.0 · 在地址栏中输入 <kbd>db</kbd> 开始翻译</p>
      </footer>
    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
